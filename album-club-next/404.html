<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Album Club</title>
    <script>
      // GitHub Pages SPA redirect trick.
      // When GitHub Pages can't find a file it serves this 404.html instead.
      // We encode the intended path into the query string and redirect to the
      // root index.html, which decodes it and hands it to React Router.
      // pathSegmentsToKeep=1 preserves the /album-club-next base segment.
      var segmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
